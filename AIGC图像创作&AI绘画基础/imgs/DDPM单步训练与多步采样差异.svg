  <text class="label" x="690" y="552">多步误差累积</text>
  <text class="small" x="690" y="578">一步偏一点，连续采样后可能变成结构、细节或语义问题</text>

  <line x1="590" y1="166" x2="590" y2="552" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="10 10"/>

  <rect class="box-green" x="192" y="580" width="798" height="48" rx="16"/>
