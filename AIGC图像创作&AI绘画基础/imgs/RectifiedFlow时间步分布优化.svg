<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760">
  <defs>
    <style>
      .title { font: 700 30px "PingFang SC","Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif; fill: #0f172a; }
      .sub { font: 500 16px "PingFang SC","Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif; fill: #475569; }
      .h { font: 700 21px "PingFang SC","Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif; fill: #0f172a; }
      .body { font: 500 15px "PingFang SC","Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif; fill: #334155; }
      .small { font: 500 13px "PingFang SC","Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif; fill: #475569; }
      .legend { font: 600 14px "PingFang SC","Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif; fill: #0f172a; }
      .axis { stroke: #64748b; stroke-width: 2; }
      .tick { stroke: #94a3b8; stroke-width: 1.5; }
      .mid { fill: #fef3c7; stroke: #f59e0b; stroke-width: 2; }
    </style>
  </defs>

  <rect width="1280" height="760" fill="#f8fafc"/>
  <rect x="34" y="28" width="1212" height="704" rx="24" fill="#ffffff" stroke="#d7dee8" stroke-width="2"/>

  <text x="640" y="74" text-anchor="middle" class="title">Rectified Flow 时间步分布优化</text>
  <text x="640" y="104" text-anchor="middle" class="sub">SD3 / FLUX 这类 RF/FM 模型不会只用均匀采样，而是提高中间困难区域的训练权重，并兼顾端点覆盖</text>

  <rect x="90" y="146" width="1100" height="330" rx="22" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>

  <line x1="160" y1="420" x2="1120" y2="420" class="axis"/>
  <line x1="160" y1="420" x2="160" y2="190" class="axis"/>
  <line x1="160" y1="420" x2="160" y2="430" class="tick"/>
  <line x1="640" y1="420" x2="640" y2="430" class="tick"/>
  <line x1="1120" y1="420" x2="1120" y2="430" class="tick"/>
  <text x="160" y="452" text-anchor="middle" class="small">t = 0</text>
  <text x="640" y="452" text-anchor="middle" class="small">t = 0.5</text>
  <text x="1120" y="452" text-anchor="middle" class="small">t = 1</text>
  <text x="140" y="206" text-anchor="end" class="small">采样密度</text>

  <rect x="520" y="224" width="240" height="154" rx="18" class="mid"/>
  <text x="640" y="258" text-anchor="middle" class="h">中间区域最难学</text>
  <text x="640" y="290" text-anchor="middle" class="body">信号和噪声混合最强</text>
  <text x="640" y="316" text-anchor="middle" class="body">少步采样误差最容易在这里放大</text>
  <text x="640" y="348" text-anchor="middle" class="small">所以优秀时间分布往往在 t ≈ 0.5 附近更密集</text>

  <path d="M 160 420 C 260 420, 360 370, 460 270 C 530 205, 590 192, 640 192 C 690 192, 750 205, 820 270 C 920 370, 1020 420, 1120 420" fill="none" stroke="#2563eb" stroke-width="5"/>
  <path d="M 160 420 C 250 404, 350 330, 470 258 C 560 210, 610 210, 640 210 C 670 210, 720 210, 810 258 C 930 330, 1030 404, 1120 420" fill="none" stroke="#16a34a" stroke-width="5" stroke-dasharray="10 8"/>
  <path d="M 160 420 C 250 390, 360 344, 490 296 C 560 270, 600 258, 640 258 C 680 258, 720 270, 790 296 C 920 344, 1030 390, 1120 420" fill="none" stroke="#f97316" stroke-width="5" stroke-dasharray="4 8"/>

  <rect x="144" y="500" width="308" height="162" rx="20" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <circle cx="184" cy="538" r="7" fill="#2563eb"/>
  <text x="206" y="544" class="legend">Logit-Normal</text>
  <text x="184" y="580" class="body">中间峰值最高</text>
  <text x="184" y="606" class="body">端点密度接近 0</text>
  <text x="184" y="632" class="small">SD3 报告中整体表现最稳</text>

  <rect x="486" y="500" width="308" height="162" rx="20" fill="#ecfdf5" stroke="#86efac" stroke-width="2"/>
  <circle cx="526" cy="538" r="7" fill="#16a34a"/>
  <text x="548" y="544" class="legend">Mode Sampling</text>
  <text x="526" y="580" class="body">仍强化中间区域</text>
  <text x="526" y="606" class="body">但端点保留非零密度</text>
  <text x="526" y="632" class="small">少步采样和端点覆盖更友好</text>

  <rect x="828" y="500" width="308" height="162" rx="20" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
  <circle cx="868" cy="538" r="7" fill="#f97316"/>
  <text x="890" y="544" class="legend">CosMap</text>
  <text x="868" y="580" class="body">中间峰值更平缓</text>
  <text x="868" y="606" class="body">尾部更重、分布更平滑</text>
  <text x="868" y="632" class="small">便于和扩散余弦 log-SNR 经验对应</text>
</svg>
