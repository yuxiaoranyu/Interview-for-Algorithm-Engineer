<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a"/>
    </marker>
    <style>
      .title { font: 700 30px "PingFang SC","Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif; fill: #0f172a; }
      .sub { font: 500 16px "PingFang SC","Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif; fill: #475569; }
      .panel { fill: #ffffff; stroke: #d7dee8; stroke-width: 2; }
      .label { font: 700 21px "PingFang SC","Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif; fill: #0f172a; }
      .body { font: 500 16px "PingFang SC","Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif; fill: #334155; }
      .small { font: 500 14px "PingFang SC","Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif; fill: #475569; }
      .code { font: 600 16px "Arial Unicode MS","STIXGeneral","Times New Roman","PingFang SC",serif; fill: #0f172a; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="#f8fafc"/>
  <rect x="36" y="28" width="1208" height="664" rx="24" class="panel"/>

  <text x="640" y="74" text-anchor="middle" class="title">Flow Matching 确定性 ODE 生成路径</text>
  <text x="640" y="104" text-anchor="middle" class="sub">先构造从噪声到数据的连续路径，再让网络直接拟合路径上的速度场</text>

  <rect x="82" y="150" width="300" height="204" rx="20" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <text x="232" y="190" text-anchor="middle" class="label">起点分布</text>
  <text x="232" y="226" text-anchor="middle" class="code">x₀ ~ N(0, I)</text>
  <text x="232" y="260" text-anchor="middle" class="body">简单噪声分布</text>
  <text x="232" y="286" text-anchor="middle" class="body">采样容易、密度已知</text>
  <text x="232" y="324" text-anchor="middle" class="small">目标：沿连续时间 t ∈ [0,1] 把噪声推到数据分布</text>

  <rect x="898" y="150" width="300" height="204" rx="20" fill="#ecfdf5" stroke="#86efac" stroke-width="2"/>
  <text x="1048" y="190" text-anchor="middle" class="label">终点分布</text>
  <text x="1048" y="226" text-anchor="middle" class="code">x₁ ~ p_data(x)</text>
  <text x="1048" y="260" text-anchor="middle" class="body">真实数据分布</text>
  <text x="1048" y="286" text-anchor="middle" class="body">图像、视频或多模态样本</text>
  <text x="1048" y="324" text-anchor="middle" class="small">终点由训练数据直接提供监督</text>

  <path d="M 382 252 C 500 180, 782 180, 898 252" fill="none" stroke="#2563eb" stroke-width="5" marker-end="url(#arrowBlue)"/>
  <text x="640" y="174" text-anchor="middle" class="body">连续流映射 φ_t</text>

  <rect x="312" y="400" width="656" height="170" rx="22" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="640" y="442" text-anchor="middle" class="label">训练时先指定路径，再匹配速度</text>
  <text x="640" y="482" text-anchor="middle" class="code">x(t) = (1−t)x₀ + t x₁</text>
  <text x="640" y="518" text-anchor="middle" class="code">v_target(x(t), t) = x₁ − x₀</text>
  <text x="640" y="548" text-anchor="middle" class="body">网络不用显式计算散度，只需回归“当前点应该往哪走、多快走”</text>

  <path d="M 640 354 L 640 400" fill="none" stroke="#16a34a" stroke-width="4" marker-end="url(#arrowGreen)"/>

  <rect x="120" y="608" width="1040" height="52" rx="18" fill="#0f172a"/>
  <text x="640" y="641" text-anchor="middle" style="font:700 18px 'PingFang SC','Microsoft YaHei','Noto Sans CJK SC',Arial,sans-serif; fill:#ffffff;">Flow Matching 的核心不是“逐步去噪”，而是“学习一条把噪声连续推到数据的确定性速度场”</text>
</svg>
