<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="720" viewBox="0 0 1180 720">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #d7dee8; stroke-width: 2; }
      .title { font: 700 30px Arial, "Microsoft YaHei", sans-serif; fill: #172033; }
      .subtitle { font: 400 18px Arial, "Microsoft YaHei", sans-serif; fill: #526071; }
      .h { font: 700 21px Arial, "Microsoft YaHei", sans-serif; fill: #253045; }
      .label { font: 600 17px Arial, "Microsoft YaHei", sans-serif; fill: #253045; }
      .small { font: 400 15px Arial, "Microsoft YaHei", sans-serif; fill: #526071; }
      .tiny { font: 400 13px Arial, "Microsoft YaHei", sans-serif; fill: #64748b; }
      .layer1 { fill: #eff6ff; stroke: #93c5fd; stroke-width: 2; }
      .layer2 { fill: #ecfdf5; stroke: #86efac; stroke-width: 2; }
      .layer3 { fill: #fff7ed; stroke: #fdba74; stroke-width: 2; }
      .layer4 { fill: #f5f3ff; stroke: #c4b5fd; stroke-width: 2; }
      .layer5 { fill: #fef2f2; stroke: #fca5a5; stroke-width: 2; }
      .arrow { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/>
    </marker>
  </defs>

  <rect class="bg" width="1180" height="720"/>
  <rect class="panel" x="42" y="34" width="1096" height="648" rx="22"/>

  <text class="title" x="82" y="84">扩散采样部署策略分层</text>
  <text class="subtitle" x="82" y="116">先决定模型上限，再选采样组合，最后做局部调参和工程加速</text>

  <rect class="layer1" x="132" y="158" width="916" height="78" rx="18"/>
  <text class="h" x="170" y="190">第一层：模型选型与蒸馏</text>
  <text class="small" x="170" y="216">决定少步质量上限：基础模型、蒸馏模型、Flow Matching / Rectified Flow 路线</text>

  <rect class="layer2" x="132" y="264" width="916" height="78" rx="18"/>
  <text class="h" x="170" y="296">第二层：采样器 + 调度器组合</text>
  <text class="small" x="170" y="322">决定主要质量速度取舍：DPM++、UniPC、Euler、Karras、模型默认 scheduler</text>

  <rect class="layer3" x="132" y="370" width="916" height="78" rx="18"/>
  <text class="h" x="170" y="402">第三层：步数、CFG、分辨率策略</text>
  <text class="small" x="170" y="428">局部调参：极少步依赖蒸馏，中等步数追求平衡，高分辨率需要更谨慎</text>

  <rect class="layer4" x="132" y="476" width="916" height="78" rx="18"/>
  <text class="h" x="170" y="508">第四层：工程化加速</text>
  <text class="small" x="170" y="534">降低延迟与成本：TensorRT、ONNX Runtime、batch、缓存、预计算调度</text>

  <rect class="layer5" x="132" y="582" width="916" height="78" rx="18"/>
  <text class="h" x="170" y="614">第五层：稳定性保障</text>
  <text class="small" x="170" y="640">生产底线：固定 seed、记录完整配置、异常检测、降级方案、质量回滚</text>

  <path class="arrow" d="M590 236 V258"/>
  <path class="arrow" d="M590 342 V364"/>
  <path class="arrow" d="M590 448 V470"/>
  <path class="arrow" d="M590 554 V576"/>

  <text class="label" x="776" y="150">速度</text>
  <text class="label" x="846" y="150">质量</text>
  <text class="label" x="916" y="150">稳定性</text>
  <text class="tiny" x="782" y="674">不要只调 steps：部署效果由多层共同决定</text>
</svg>
