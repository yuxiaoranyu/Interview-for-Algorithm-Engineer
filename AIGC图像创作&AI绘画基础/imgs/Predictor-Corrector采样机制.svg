<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f97316"/>
    </marker>
    <style>
      .title { font: 700 30px "PingFang SC","Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif; fill: #0f172a; }
      .subtitle { font: 500 16px "PingFang SC","Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif; fill: #475569; }
      .label { font: 700 18px "PingFang SC","Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif; fill: #0f172a; }
      .body { font: 500 15px "PingFang SC","Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif; fill: #334155; }
      .small { font: 500 13px "PingFang SC","Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif; fill: #475569; }
      .code { font: 600 14px "Arial Unicode MS","STIXGeneral","Times New Roman","PingFang SC",serif; fill: #111827; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="#ffffff"/>

  <text x="640" y="46" text-anchor="middle" class="title">Predictor-Corrector 采样机制</text>
  <text x="640" y="76" text-anchor="middle" class="subtitle">Predictor 负责跨时间步推进，Corrector 负责在当前时间层做局部修正</text>

  <rect x="78" y="152" width="210" height="102" rx="18" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <text x="183" y="188" text-anchor="middle" class="label">当前样本</text>
  <g data-formula="$x_t$" transform="translate(176.105 220.000) scale(1 -1)"><path d="M9.603,8.800 L5.585,4.510 L8.047,0.050 L6.397,0.050 L4.548,3.520 L1.328,0.050 L-0.415,0.050 L3.890,4.660 L1.603,8.800 L3.250,8.800 L4.930,5.635 L7.860,8.800 L9.603,8.800 Z M14.204,3.550 L14.052,2.768 L12.045,2.768 L11.394,-0.557 Q11.361,-0.743 11.345,-0.869 Q11.329,-0.995 11.329,-1.065 Q11.329,-1.415 11.539,-1.574 Q11.749,-1.733 12.215,-1.733 L13.231,-1.733 L13.062,-2.575 L12.099,-2.575 Q11.203,-2.575 10.762,-2.225 Q10.323,-1.875 10.323,-1.165 Q10.323,-1.039 10.338,-0.888 Q10.354,-0.738 10.388,-0.557 L11.038,2.768 L10.184,2.768 L10.344,3.550 L11.180,3.550 L11.520,5.289 L12.526,5.289 L12.192,3.550 L14.204,3.550 Z" fill="#0f172a"/></g><path d="M 296 202 L 456 202" fill="none" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <text x="376" y="178" text-anchor="middle" class="label" fill="#2563eb">Predictor</text>
  <text x="376" y="232" text-anchor="middle" class="small">SDE/ODE 数值推进</text>

  <rect x="470" y="152" width="260" height="102" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="600" y="188" text-anchor="middle" class="label">粗略预测</text>
  <g data-formula="$x'_{t-\Delta t}$" transform="translate(578.013 220.000) scale(1 -1)"><path d="M9.603,8.843 L5.585,4.553 L8.047,0.093 L6.397,0.093 L4.548,3.563 L1.328,0.093 L-0.415,0.093 L3.890,4.703 L1.603,8.843 L3.250,8.843 L4.930,5.678 L7.860,8.843 L9.603,8.843 Z M10.577,6.826 Q10.505,6.847 10.505,6.934 L11.874,12.021 Q11.939,12.228 12.096,12.354 Q12.255,12.480 12.458,12.480 Q12.721,12.480 12.920,12.307 Q13.120,12.135 13.120,11.873 Q13.120,11.759 13.060,11.615 L11.037,6.777 Q10.999,6.700 10.932,6.700 Q10.873,6.700 10.743,6.754 Q10.616,6.810 10.577,6.826 Z M18.588,3.593 L18.436,2.811 L16.429,2.811 L15.778,-0.514 Q15.745,-0.699 15.729,-0.825 Q15.713,-0.951 15.713,-1.021 Q15.713,-1.371 15.923,-1.531 Q16.133,-1.690 16.599,-1.690 L17.615,-1.690 L17.446,-2.532 L16.483,-2.532 Q15.587,-2.532 15.146,-2.182 Q14.707,-1.832 14.707,-1.121 Q14.707,-0.995 14.723,-0.845 Q14.738,-0.694 14.772,-0.514 L15.423,2.811 L14.569,2.811 L14.728,3.593 L15.564,3.593 L15.904,5.333 L16.910,5.333 L16.576,3.593 L18.588,3.593 Z M21.613,1.444 L28.623,1.444 L28.623,0.515 L21.613,0.515 L21.613,1.444 Z M35.822,4.545 L33.578,-1.613 L38.069,-1.613 L35.822,4.545 Z M32.080,-2.532 L35.197,5.634 L36.450,5.634 L39.561,-2.532 L32.080,-2.532 Z M44.390,3.593 L44.238,2.811 L42.230,2.811 L41.579,-0.514 Q41.546,-0.699 41.530,-0.825 Q41.515,-0.951 41.515,-1.021 Q41.515,-1.371 41.725,-1.531 Q41.935,-1.690 42.400,-1.690 L43.417,-1.690 L43.247,-2.532 L42.285,-2.532 Q41.389,-2.532 40.948,-2.182 Q40.508,-1.832 40.508,-1.121 Q40.508,-0.995 40.524,-0.845 Q40.540,-0.694 40.573,-0.514 L41.224,2.811 L40.370,2.811 L40.529,3.593 L41.366,3.593 L41.705,5.333 L42.712,5.333 L42.377,3.593 L44.390,3.593 Z" fill="#0f172a"/></g><path d="M 738 202 L 898 202" fill="none" stroke="#f97316" stroke-width="4" marker-end="url(#arrowOrange)"/>
  <text x="818" y="178" text-anchor="middle" class="label" fill="#f97316">Corrector</text>
  <text x="818" y="232" text-anchor="middle" class="small">K 步 Langevin 局部校正</text>

  <rect x="912" y="152" width="250" height="102" rx="18" fill="#ecfdf5" stroke="#86efac" stroke-width="2"/>
  <text x="1037" y="188" text-anchor="middle" class="label">校正后样本</text>
  <g data-formula="$x_{t-\Delta t}$" transform="translate(1017.205 220.000) scale(1 -1)"><path d="M9.603,8.800 L5.585,4.510 L8.047,0.050 L6.397,0.050 L4.548,3.520 L1.328,0.050 L-0.415,0.050 L3.890,4.660 L1.603,8.800 L3.250,8.800 L4.930,5.635 L7.860,8.800 L9.603,8.800 Z M14.204,3.550 L14.052,2.768 L12.045,2.768 L11.394,-0.557 Q11.361,-0.743 11.345,-0.869 Q11.329,-0.995 11.329,-1.065 Q11.329,-1.415 11.539,-1.574 Q11.749,-1.733 12.215,-1.733 L13.231,-1.733 L13.062,-2.575 L12.099,-2.575 Q11.203,-2.575 10.762,-2.225 Q10.323,-1.875 10.323,-1.165 Q10.323,-1.039 10.338,-0.888 Q10.354,-0.738 10.388,-0.557 L11.038,2.768 L10.184,2.768 L10.344,3.550 L11.180,3.550 L11.520,5.289 L12.526,5.289 L12.192,3.550 L14.204,3.550 Z M17.229,1.401 L24.239,1.401 L24.239,0.472 L17.229,0.472 L17.229,1.401 Z M31.438,4.502 L29.194,-1.656 L33.685,-1.656 L31.438,4.502 Z M27.696,-2.575 L30.813,5.590 L32.066,5.590 L35.177,-2.575 L27.696,-2.575 Z M40.006,3.550 L39.854,2.768 L37.846,2.768 L37.195,-0.557 Q37.162,-0.743 37.146,-0.869 Q37.131,-0.995 37.131,-1.065 Q37.131,-1.415 37.341,-1.574 Q37.551,-1.733 38.016,-1.733 L39.033,-1.733 L38.863,-2.575 L37.901,-2.575 Q37.005,-2.575 36.564,-2.225 Q36.124,-1.875 36.124,-1.165 Q36.124,-1.039 36.140,-0.888 Q36.156,-0.738 36.189,-0.557 L36.840,2.768 L35.986,2.768 L36.145,3.550 L36.982,3.550 L37.321,5.289 L38.328,5.289 L37.993,3.550 L40.006,3.550 Z" fill="#0f172a"/></g><path d="M 1037 262 C 1037 334, 183 334, 183 262" fill="none" stroke="#64748b" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#arrowBlue)"/>
  <text x="610" y="320" text-anchor="middle" class="small">重复循环，直到 t = 0</text>

  <rect x="106" y="404" width="320" height="158" rx="18" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <text x="266" y="440" text-anchor="middle" class="label">Predictor 做什么</text>
  <text x="266" y="474" text-anchor="middle" class="body">沿反向生成方向快速前进</text>
  <text x="266" y="502" text-anchor="middle" class="body">减少从 T 到 0 的总步数</text>
  <text x="266" y="532" text-anchor="middle" class="small">代价：大步长会带来离散化误差</text>

  <rect x="480" y="404" width="320" height="158" rx="18" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
  <text x="640" y="440" text-anchor="middle" class="label">Corrector 做什么</text>
  <text x="640" y="474" text-anchor="middle" class="body">利用 Score 指向高概率区域</text>
  <text x="640" y="502" text-anchor="middle" class="body">用随机噪声保留局部探索能力</text>
  <text x="640" y="532" text-anchor="middle" class="small">代价：额外网络前向和随机性</text>

  <rect x="854" y="404" width="320" height="158" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="1014" y="440" text-anchor="middle" class="label">整体权衡</text>
  <text x="1014" y="474" text-anchor="middle" class="body">质量通常更稳，但速度更慢</text>
  <text x="1014" y="502" text-anchor="middle" class="body">需要调 Corrector 步数和步长</text>
  <text x="1014" y="532" text-anchor="middle" class="small">收益取决于模型、调度和求解器</text>

  <rect x="165" y="622" width="950" height="56" rx="16" fill="#0f172a"/>
  <text x="640" y="657" text-anchor="middle" style="font:600 16px 'PingFang SC','Microsoft YaHei','Noto Sans CJK SC',Arial,sans-serif; fill:#e2e8f0;">一句话：Predictor 负责“走过去”，Corrector 负责“站稳一点”</text>
</svg>
