<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="620" viewBox="0 0 1280 620">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrowSoft" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
    </marker>
    <style>
      .title { font: 700 30px "PingFang SC","Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif; fill: #0f172a; }
      .sub { font: 500 16px "PingFang SC","Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif; fill: #475569; }
      .label { font: 700 18px "PingFang SC","Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif; fill: #0f172a; }
      .body { font: 500 15px "PingFang SC","Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif; fill: #1f2937; }
      .code { font: 600 15px "Menlo","Consolas","Courier New",monospace; fill: #0f172a; }
      .small { font: 500 13px "PingFang SC","Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif; fill: #334155; }
    </style>
  </defs>

  <rect width="1280" height="620" fill="#ffffff"/>

  <text x="640" y="48" text-anchor="middle" class="title">DDIM 核心原理总览</text>
  <text x="640" y="78" text-anchor="middle" class="sub">
    <tspan>训练目标不变，改变的是采样路径：保持 q(x</tspan><tspan baseline-shift="sub" font-size="11">t</tspan><tspan>|x</tspan><tspan baseline-shift="sub" font-size="11">0</tspan><tspan>) 不变，重构反向更新方式</tspan>
  </text>

  <rect x="70" y="138" width="285" height="154" rx="18" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <text x="212" y="176" text-anchor="middle" class="label">训练数据 / 边缘分布</text>
  <text x="212" y="211" text-anchor="middle" class="code">
    <tspan>x</tspan><tspan baseline-shift="sub" font-size="11">t</tspan><tspan> = √ᾱ</tspan><tspan baseline-shift="sub" font-size="11">t</tspan><tspan> · x</tspan><tspan baseline-shift="sub" font-size="11">0</tspan>
  </text>
  <text x="212" y="236" text-anchor="middle" class="code">
    <tspan>+ √(1−ᾱ</tspan><tspan baseline-shift="sub" font-size="11">t</tspan><tspan>) · ε</tspan>
  </text>
  <text x="212" y="270" text-anchor="middle" class="small">
    <tspan>训练只关心每个时间步的 q(x</tspan><tspan baseline-shift="sub" font-size="10">t</tspan><tspan>|x</tspan><tspan baseline-shift="sub" font-size="10">0</tspan><tspan>)</tspan>
  </text>

  <path d="M 355 215 C 395 215, 415 215, 455 215" fill="none" stroke="#3b82f6" stroke-width="3.5" marker-end="url(#arrow)"/>

  <rect x="470" y="116" width="340" height="198" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="640" y="154" text-anchor="middle" class="label">训练目标不变</text>
  <text x="640" y="190" text-anchor="middle" class="code">
    <tspan>L</tspan><tspan baseline-shift="sub" font-size="11">simple</tspan><tspan> = E || ε − ε</tspan><tspan baseline-shift="sub" font-size="11">θ</tspan><tspan>(x</tspan><tspan baseline-shift="sub" font-size="11">t</tspan><tspan>, t) ||²</tspan>
  </text>
  <text x="640" y="226" text-anchor="middle" class="body">模型学习的是“噪声预测”</text>
  <text x="640" y="252" text-anchor="middle" class="body">不是显式学习完整的联合轨迹</text>
  <text x="640" y="278" text-anchor="middle" class="body">所以采样路径可以重新设计</text>

  <path d="M 810 215 C 850 215, 870 215, 910 215" fill="none" stroke="#f59e0b" stroke-width="3.5" marker-end="url(#arrowSoft)"/>

  <rect x="925" y="92" width="285" height="248" rx="18" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
  <text x="1067" y="130" text-anchor="middle" class="label">采样路径重构</text>

  <rect x="950" y="152" width="235" height="60" rx="14" fill="#ffffff" stroke="#f97316" stroke-width="2"/>
  <text x="1067" y="177" text-anchor="middle" class="body">DDPM：随机马尔可夫链</text>
  <text x="1067" y="199" text-anchor="middle" class="small">每步注入噪声，必须逐步走完</text>

  <rect x="950" y="226" width="235" height="84" rx="14" fill="#ffffff" stroke="#22c55e" stroke-width="2"/>
  <text x="1067" y="252" text-anchor="middle" class="body">DDIM：非马尔可夫采样</text>
  <text x="1067" y="274" text-anchor="middle" class="small">
    <tspan>可跳步 / σ</tspan><tspan baseline-shift="sub" font-size="10">t</tspan><tspan> 可控 / 轨迹可确定</tspan>
  </text>
  <text x="1067" y="296" text-anchor="middle" class="small">同一模型，换一条更短的路</text>

  <path d="M 640 314 C 640 352, 640 360, 640 390" fill="none" stroke="#cbd5e1" stroke-width="2.5" stroke-dasharray="8 6"/>

  <rect x="140" y="406" width="1000" height="114" rx="20" fill="#0f172a"/>
  <text x="640" y="446" text-anchor="middle" style="font:700 22px 'PingFang SC','Microsoft YaHei','Noto Sans CJK SC',Arial,sans-serif; fill:#ffffff;">DDIM = 训练不变 + 采样路径重构 + 随机性可控</text>
  <text x="640" y="480" text-anchor="middle" style="font:500 16px 'PingFang SC','Microsoft YaHei','Noto Sans CJK SC',Arial,sans-serif; fill:#cbd5e1;">
    <tspan>它保留 DDPM 已学好的噪声预测器，只重新定义 x</tspan><tspan baseline-shift="sub" font-size="12">t</tspan><tspan> → x</tspan><tspan baseline-shift="sub" font-size="12">t−1</tspan><tspan> 的更新方式</tspan>
  </text>
  <text x="640" y="506" text-anchor="middle" style="font:500 16px 'PingFang SC','Microsoft YaHei','Noto Sans CJK SC',Arial,sans-serif; fill:#cbd5e1;">所以既能加速采样，也能在 η = 0 时得到稳定的确定性轨迹</text>
</svg>
