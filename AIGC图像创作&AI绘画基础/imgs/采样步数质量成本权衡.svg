<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="720" viewBox="0 0 1180 720">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #d7dee8; stroke-width: 2; }
      .title { font: 700 30px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #172033; }
      .subtitle { font: 400 18px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #526071; }
      .h { font: 700 21px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #253045; }
      .label { font: 600 17px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #253045; }
      .small { font: 400 15px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #526071; }
      .tiny { font: 400 13px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #64748b; }
      .axis { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .grid { stroke: #e2e8f0; stroke-width: 1.5; }
      .quality { stroke: #2563eb; stroke-width: 5; fill: none; }
      .cost { stroke: #f97316; stroke-width: 5; fill: none; }
      .zone1 { fill: #eff6ff; opacity: .85; }
      .zone2 { fill: #ecfdf5; opacity: .85; }
      .zone3 { fill: #fff7ed; opacity: .85; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/>
    </marker>
  </defs>

  <rect class="bg" width="1180" height="720"/>
  <rect class="panel" x="42" y="34" width="1096" height="648" rx="22"/>

  <text class="title" x="82" y="84">采样步数、质量与成本的权衡</text>
  <text class="subtitle" x="82" y="116">增加步数会降低数值积分误差，但质量收益会逐渐变小，计算成本持续增长</text>

  <rect class="zone1" x="150" y="176" width="220" height="330" rx="12"/>
  <rect class="zone2" x="370" y="176" width="360" height="330" rx="12"/>
  <rect class="zone3" x="730" y="176" width="300" height="330" rx="12"/>

  <line class="grid" x1="150" y1="430" x2="1030" y2="430"/>
  <line class="grid" x1="150" y1="350" x2="1030" y2="350"/>
  <line class="grid" x1="150" y1="270" x2="1030" y2="270"/>

  <path class="axis" d="M150 506 H1048"/>
  <path class="axis" d="M150 506 V152"/>
  <text class="label" x="1010" y="540">步数</text>
  <text class="label" x="86" y="166">质量 / 成本</text>

  <path class="quality" d="M160 468 C240 380, 320 305, 450 250 C580 198, 730 186, 1010 180"/>
  <path class="cost" d="M160 490 L1010 188"/>

  <text class="label" x="856" y="178" fill="#2563eb">质量：先快后慢</text>
  <text class="label" x="820" y="244" fill="#f97316">成本：近似线性增长</text>

  <text class="h" x="198" y="552">0-10步</text>
  <text class="small" x="178" y="578">从噪声到可识别结构</text>
  <text class="tiny" x="204" y="602">提升最快</text>

  <text class="h" x="482" y="552">10-30步</text>
  <text class="small" x="456" y="578">细节逐步丰富</text>
  <text class="tiny" x="458" y="602">常见质量速度平衡区</text>

  <text class="h" x="820" y="552">30步以上</text>
  <text class="small" x="792" y="578">收益递减更明显</text>
  <text class="tiny" x="792" y="602">是否值得取决于模型和业务门槛</text>

  <rect class="card" x="166" y="628" width="848" height="44" rx="14"/>
  <text class="label" x="228" y="656">面试抓手：步数不是越多越好，关键是模型、scheduler、sampler 与业务质量门槛一起决定。</text>
</svg>
