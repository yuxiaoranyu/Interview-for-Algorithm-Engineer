<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a"/>
    </marker>
    <style>
      .title { font: 700 30px "PingFang SC","Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif; fill: #0f172a; }
      .subtitle { font: 500 16px "PingFang SC","Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif; fill: #475569; }
      .label { font: 700 18px "PingFang SC","Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif; fill: #0f172a; }
      .body { font: 500 15px "PingFang SC","Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif; fill: #334155; }
      .small { font: 500 13px "PingFang SC","Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif; fill: #475569; }
      .code { font: 600 15px "Arial Unicode MS","STIXGeneral","Times New Roman","PingFang SC",serif; fill: #111827; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="#ffffff"/>

  <text x="640" y="46" text-anchor="middle" class="title">SDE 框架如何统一 DDPM 与 Score-Based Model</text>
  <text x="640" y="76" text-anchor="middle" class="subtitle">正向过程由人工设计，反向生成只需要学习同一个核心量：Score 函数</text>

  <rect x="70" y="132" width="220" height="120" rx="18" fill="#ecfdf5" stroke="#86efac" stroke-width="2"/>
  <text x="180" y="168" text-anchor="middle" class="label">数据分布</text>
  <text x="180" y="200" text-anchor="middle" class="code">p₀(x)</text>
  <text x="180" y="226" text-anchor="middle" class="small">真实图像 / 训练样本</text>

  <rect x="990" y="132" width="220" height="120" rx="18" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <text x="1100" y="168" text-anchor="middle" class="label">简单先验</text>
  <text x="1100" y="200" text-anchor="middle" class="code">p_T(x)</text>
  <text x="1100" y="226" text-anchor="middle" class="small">高斯噪声分布</text>

  <path d="M 300 190 C 430 104, 850 104, 980 190" fill="none" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <text x="640" y="130" text-anchor="middle" class="label">正向 SDE：数据逐渐加噪</text>
  <text x="640" y="158" text-anchor="middle" class="code">dx = f(x,t)dt + g(t)dw</text>

  <path d="M 980 218 C 850 304, 430 304, 300 218" fill="none" stroke="#16a34a" stroke-width="4" marker-end="url(#arrowGreen)"/>
  <text x="640" y="276" text-anchor="middle" class="label">反向 SDE：噪声逐渐生成数据</text>
  <text x="640" y="304" text-anchor="middle" class="code">dx = [ f(x,t) - g²(t) s_θ(x,t) ]dt + g(t)dw̄</text>

  <rect x="395" y="352" width="490" height="126" rx="20" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
  <text x="640" y="388" text-anchor="middle" class="label">真正需要训练的部分</text>
  <text x="640" y="424" text-anchor="middle" class="code">s_θ(x,t) ≈ ∇_x log p_t(x)</text>
  <text x="640" y="452" text-anchor="middle" class="body">Score 网络告诉采样器：当前位置应该往高概率区域怎么走</text>

  <rect x="92" y="540" width="315" height="110" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="250" y="574" text-anchor="middle" class="label">DDPM</text>
  <text x="250" y="604" text-anchor="middle" class="body">VP-SDE 的离散化视角</text>
  <text x="250" y="630" text-anchor="middle" class="small">常用噪声预测 ε_θ(x_t, t)</text>

  <rect x="482" y="540" width="315" height="110" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="640" y="574" text-anchor="middle" class="label">Score-Based / NCSN</text>
  <text x="640" y="604" text-anchor="middle" class="body">VE-SDE 的多尺度噪声视角</text>
  <text x="640" y="630" text-anchor="middle" class="small">直接学习不同噪声尺度下的 Score</text>

  <rect x="872" y="540" width="315" height="110" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="1030" y="574" text-anchor="middle" class="label">统一结论</text>
  <text x="1030" y="604" text-anchor="middle" class="body">噪声过程不同，目标本质相通</text>
  <text x="1030" y="630" text-anchor="middle" class="small">都是估计带噪分布的 Score</text>
</svg>
