<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="720" viewBox="0 0 1180 720">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #d7dee8; stroke-width: 2; }
      .title { font: 700 30px Arial, "Microsoft YaHei", sans-serif; fill: #172033; }
      .subtitle { font: 400 18px Arial, "Microsoft YaHei", sans-serif; fill: #526071; }
      .h { font: 700 22px Arial, "Microsoft YaHei", sans-serif; fill: #253045; }
      .label { font: 600 17px Arial, "Microsoft YaHei", sans-serif; fill: #253045; }
      .small { font: 400 15px Arial, "Microsoft YaHei", sans-serif; fill: #526071; }
      .tiny { font: 400 13px Arial, "Microsoft YaHei", sans-serif; fill: #64748b; }
      .blue { fill: #eff6ff; stroke: #93c5fd; stroke-width: 2; }
      .green { fill: #ecfdf5; stroke: #86efac; stroke-width: 2; }
      .orange { fill: #fff7ed; stroke: #fdba74; stroke-width: 2; }
      .red { fill: #fef2f2; stroke: #fca5a5; stroke-width: 2; }
      .gray { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.5; }
      .arrow { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #94a3b8; stroke-width: 2.5; stroke-dasharray: 8 8; fill: none; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/>
    </marker>
  </defs>

  <rect class="bg" width="1180" height="720"/>
  <rect class="panel" x="42" y="34" width="1096" height="648" rx="22"/>

  <text class="title" x="82" y="84">Sampler 与 Scheduler 如何配合</text>
  <text class="subtitle" x="82" y="116">Scheduler 决定噪声水平序列，Sampler 在这些点上执行数值更新</text>

  <rect class="blue" x="82" y="168" width="260" height="344" rx="20"/>
  <text class="h" x="114" y="210">模型训练分布</text>
  <text class="small" x="114" y="242">模型见过的噪声范围</text>
  <text class="small" x="114" y="270">时间编码方式</text>
  <text class="small" x="114" y="298">prediction type</text>
  <rect class="gray" x="114" y="342" width="194" height="74" rx="14"/>
  <text class="label" x="138" y="374">训练时学到</text>
  <text class="tiny" x="138" y="398">不同噪声水平下的去噪方向</text>

  <rect class="green" x="460" y="168" width="260" height="344" rx="20"/>
  <text class="h" x="492" y="210">Scheduler</text>
  <text class="small" x="492" y="242">选择采样步点</text>
  <text class="small" x="492" y="270">安排噪声从大到小</text>
  <text class="small" x="492" y="298">控制低噪声区域密度</text>
  <rect class="gray" x="492" y="342" width="194" height="74" rx="14"/>
  <text class="label" x="516" y="374">典型例子</text>
  <text class="tiny" x="516" y="398">Linear / Cosine / Karras</text>

  <rect class="orange" x="838" y="168" width="260" height="344" rx="20"/>
  <text class="h" x="870" y="210">Sampler</text>
  <text class="small" x="870" y="242">在每个步点更新样本</text>
  <text class="small" x="870" y="270">决定一阶/二阶/多步</text>
  <text class="small" x="870" y="298">决定是否注入随机噪声</text>
  <rect class="gray" x="870" y="342" width="194" height="74" rx="14"/>
  <text class="label" x="894" y="374">典型例子</text>
  <text class="tiny" x="894" y="398">Euler / DPM++ / UniPC</text>

  <path class="arrow" d="M342 340 H452"/>
  <path class="arrow" d="M720 340 H830"/>
  <text class="tiny" x="364" y="324">噪声范围要匹配</text>
  <text class="tiny" x="742" y="324">步点交给采样器执行</text>

  <rect class="red" x="178" y="562" width="824" height="76" rx="18"/>
  <text class="label" x="216" y="594">错配的本质</text>
  <text class="small" x="216" y="620">采样时的噪声范围、时间参数化或离散步点分布明显偏离训练分布，模型就容易在“不熟悉的位置”预测。</text>
  <path class="dash" d="M590 512 V560"/>
</svg>
