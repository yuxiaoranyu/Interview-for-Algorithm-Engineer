<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="720" viewBox="0 0 1180 720">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #d7dee8; stroke-width: 2; }
      .title { font: 700 30px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #172033; }
      .subtitle { font: 400 18px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #526071; }
      .h { font: 700 22px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #253045; }
      .label { font: 600 17px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #253045; }
      .small { font: 400 15px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #526071; }
      .tiny { font: 400 13px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #64748b; }
      .blue { fill: #eff6ff; stroke: #93c5fd; stroke-width: 2; }
      .green { fill: #ecfdf5; stroke: #86efac; stroke-width: 2; }
      .orange { fill: #fff7ed; stroke: #fdba74; stroke-width: 2; }
      .purple { fill: #f5f3ff; stroke: #c4b5fd; stroke-width: 2; }
      .gray { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.5; }
      .line { stroke: #94a3b8; stroke-width: 2.5; fill: none; }
    </style>
  </defs>

  <rect class="bg" width="1180" height="720"/>
  <rect class="panel" x="42" y="34" width="1096" height="648" rx="22"/>

  <text class="title" x="82" y="84">扩散采样器类型总览</text>
  <text class="subtitle" x="82" y="116">采样器决定“怎么走一步”，不同类型在速度、质量、稳定性和多样性之间取舍</text>

  <rect class="blue" x="78" y="164" width="250" height="360" rx="20"/>
  <text class="h" x="110" y="206">传统 ODE 求解器</text>
  <text class="small" x="110" y="238">确定性强，实现简单</text>
  <rect class="gray" x="110" y="270" width="186" height="48" rx="12"/>
  <text class="label" x="132" y="300">Euler</text>
  <rect class="gray" x="110" y="334" width="186" height="48" rx="12"/>
  <text class="label" x="132" y="364">Heun</text>
  <rect class="gray" x="110" y="398" width="186" height="48" rx="12"/>
  <text class="label" x="132" y="428">LMS / PLMS</text>
  <text class="tiny" x="110" y="478">适合：稳定基线、可复现生成</text>

  <rect class="orange" x="352" y="164" width="250" height="360" rx="20"/>
  <text class="h" x="384" y="206">祖先随机采样器</text>
  <text class="small" x="384" y="238">每步可重新注入噪声</text>
  <rect class="gray" x="384" y="270" width="186" height="48" rx="12"/>
  <text class="label" x="406" y="300">Euler a</text>
  <rect class="gray" x="384" y="334" width="186" height="48" rx="12"/>
  <text class="label" x="406" y="364">DPM2 a</text>
  <rect class="gray" x="384" y="398" width="186" height="48" rx="12"/>
  <text class="label" x="406" y="428">DPM++ 2S a</text>
  <text class="tiny" x="384" y="478">适合：创意发散、风格多样</text>

  <rect class="green" x="626" y="164" width="250" height="360" rx="20"/>
  <text class="h" x="658" y="206">扩散专属求解器</text>
  <text class="small" x="658" y="238">针对扩散方程做优化</text>
  <rect class="gray" x="658" y="270" width="186" height="48" rx="12"/>
  <text class="label" x="680" y="300">DDIM</text>
  <rect class="gray" x="658" y="334" width="186" height="48" rx="12"/>
  <text class="label" x="680" y="364">DPM-Solver / DPM++</text>
  <rect class="gray" x="658" y="398" width="186" height="48" rx="12"/>
  <text class="label" x="680" y="428">UniPC</text>
  <text class="tiny" x="658" y="478">适合：少步高质量、通用生成</text>

  <rect class="purple" x="900" y="164" width="204" height="360" rx="20"/>
  <text class="h" x="932" y="206">调度增强</text>
  <text class="small" x="932" y="238">改变采样步点分布</text>
  <rect class="gray" x="932" y="270" width="140" height="48" rx="12"/>
  <text class="label" x="954" y="300">Karras</text>
  <rect class="gray" x="932" y="334" width="140" height="48" rx="12"/>
  <text class="label" x="954" y="364">Cosine</text>
  <rect class="gray" x="932" y="398" width="140" height="48" rx="12"/>
  <text class="label" x="954" y="428">Linear</text>
  <text class="tiny" x="932" y="478">注意：不是独立采样器</text>

  <path class="line" d="M203 546 C203 580, 1002 580, 1002 546"/>
  <text class="label" x="358" y="620">核心区分：采样器是“积分方法”，调度器是“时间/噪声步点设计”</text>
</svg>
